id: web-quick
name: Web Quick Scan
description: Fast web application reconnaissance and vulnerability scanning
target_types:
  - url
phases:
  - name: discovery
    parallel: true
    tools:
      - tool: whatweb
        task_type: shell
        command_template: "docker exec whatweb-mcp sh -c \"whatweb --color=never --log-json=/tmp/whatweb.json {target} > /dev/null 2>&1; cat /tmp/whatweb.json\""
        parser: whatweb
        priority: 10
        tier: fast
        resource_group: shell
        preferred_output_format: json
      - tool: waybackurls
        task_type: shell
        command_template: "docker exec waybackurls-mcp sh -c \"echo {target_host} | waybackurls\""
        parser: waybackurls
        priority: 20
        tier: fast
        resource_group: shell
  - name: scanning
    parallel: true
    tools:
      - tool: nuclei
        task_type: shell
        command_template: "docker exec nuclei-mcp nuclei -u {target} -jsonl -silent -severity critical,high,medium,low,info"
        parser: nuclei
        priority: 30
        tier: normal
        resource_group: shell
        preferred_output_format: json
      - tool: nikto
        task_type: shell
        command_template: "docker exec nikto-mcp sh -c \"nikto -h {target} -Format json -output /tmp/nikto.json -maxtime 180 >/dev/null 2>&1; cat /tmp/nikto.json\""
        parser: nikto
        priority: 40
        tier: normal
        resource_group: shell
        preferred_output_format: json
