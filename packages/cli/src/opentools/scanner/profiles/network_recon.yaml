id: network-recon
name: Network Reconnaissance
description: Network discovery and service enumeration
target_types:
  - network
phases:
  - name: host-discovery
    parallel: true
    tools:
      - tool: nmap
        task_type: shell
        command_template: "docker exec nmap-mcp sh -c \"nmap -sV -sC -Pn -p {target_port} -oX - {target_host}\""
        parser: nmap
        priority: 10
        tier: normal
        resource_group: shell
reactive_edges:
  - evaluator: "builtin:open_ports_to_vuln_scan"
    trigger_tool: "nmap"
    max_spawns: 20
    max_spawns_per_trigger: 5
