[project]
name = "opentools"
version = "0.1.0"
description = "CLI toolkit for the OpenTools security plugin"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.15.0",
    "pydantic>=2.0",
    "rich>=13.0",
    "ruamel.yaml>=0.18",
    "sqlite-utils>=3.37",
    "jinja2>=3.1.6",
    "httpx>=0.28",
    "rustworkx>=0.15.0",
    "tldextract>=5.1.0",
    "aiolimiter>=1.2.0",
    "tenacity>=9.0.0",
    "orjson>=3.10.0",
    "sqlalchemy>=2.0.30",
    "aiosqlite>=0.21",
]

[project.optional-dependencies]
dashboard = [
    "textual>=8.0",
]
llm = [
    "anthropic>=0.40.0",
    "openai>=1.50.0",
    "ollama>=0.3.0",
    "claude-agent-sdk>=0.1.0",
]
anthropic = [
    "anthropic>=0.40.0",
]
openai = [
    "openai>=1.50.0",
]
ollama = [
    "ollama>=0.3.0",
]
all = [
    "opentools[dashboard,llm]",
]
dev = [
    "pytest-xdist>=3",
    "opentools[all]",
]

[project.scripts]
opentools = "opentools.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opentools"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
