services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opentools
      POSTGRES_USER: opentools
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentools"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ../..
      dockerfile: packages/web/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://opentools:${POSTGRES_PASSWORD}@postgres:5432/opentools
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: packages/web/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://opentools:${POSTGRES_PASSWORD}@postgres:5432/opentools
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      OPENTOOLS_PLUGIN_DIR: /app/packages/plugin
      OPENTOOLS_WORKSPACE: /workspace
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - appdata:/app/data
      - //var/run/docker.sock:/var/run/docker.sock
      - ${WORKSPACE_DIR:-C:/Users/slabl/workspace}:/workspace
    ports:
      - "8000:8000"
    networks:
      - default
      - mcp-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  appdata:

networks:
  default:
  mcp-network:
    external: true
    name: mcp-security-hub_mcp-network
